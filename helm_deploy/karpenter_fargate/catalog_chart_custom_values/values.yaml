replicaCount: 1

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-catalog
  tag: "1.3.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: aws-cli-sa

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 256Mi

catalog:
  persistence:
    provider: mysql
    endpoint: catalog-mysql:3306
    dbName: catalogdb
    connectTimeout: "5"

healthCheck:
  path: /health

securityContext:
  runAsUser: 1000
  fsGroup: 1000

secrets:
  volumeName: aws-secrets
  mountPath: /mnt/secrets-store
  secretProviderClass: catalog-db-secrets

externalMysql:
  enabled: true
  serviceName: catalog-mysql
  externalName: db.catalog.local

ingress:
  enabled: true
  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

  backendService: catalog-np

  hosts:
    - host: myapp.local
      paths:
        - path: /
          pathType: Prefix

  tls:
    - secretName: myapp-tls
      hosts:
        - myapp.local

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: karpenter.sh/capacity-type
              operator: In
              values: ["on-demand"]
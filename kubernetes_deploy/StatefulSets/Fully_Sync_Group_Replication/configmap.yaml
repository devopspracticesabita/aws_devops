apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog
data:
  RETAIL_CATALOG_PERSISTENCE_PROVIDER: "mysql"
  RETAIL_CATALOG_PERSISTENCE_ENDPOINT: "catalog-mysql-0.catalog-mysql.default.svc.cluster.local:3306"
  RETAIL_CATALOG_PERSISTENCE_DB_NAME: "catalogdb"
  RETAIL_CATALOG_PERSISTENCE_CONNECT_TIMEOUT: "5"
  MYSQL_DATABASE: "catalogdb"
  group-replication.cnf: |
    [mysqld]
    bind-address = 0.0.0.0
    # GTID Mode (Required)
    gtid_mode=ON
    enforce_gtid_consistency=ON
    
    # Binary Log & Format (Required for Group Replication)
    log_bin=binlog
    binlog_format=ROW
    log_slave_updates=ON
    
    # Group Replication Plugin & Settings
    plugin-load-add=group_replication.so
    group_replication_group_name="168dcb64-7cce-473a-b338-6501f305e561"
    group_replication_start_on_boot=OFF
    group_replication_bootstrap_group=OFF
    
    # Seeds (Stable DNS names for all pods in the StatefulSet)
    group_replication_group_seeds="catalog-mysql-0.catalog-mysql:33061,catalog-mysql-1.catalog-mysql:33061,catalog-mysql-2.catalog-mysql:33061"
